services:
  - type: web
    name: nucleus-phone
    runtime: node
    plan: starter
    buildCommand: cd client && npm install && npm run build && cd .. && npm install
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: instantly-analytics-db
          property: connectionString
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_API_KEY_SID
        sync: false
      - key: TWILIO_API_KEY_SECRET
        sync: false
      - key: TWILIO_TWIML_APP_SID
        sync: false
      - key: NUCLEUS_PHONE_NUMBER
        sync: false
      - key: FIREFLIES_API_KEY
        sync: false
      - key: HUBSPOT_ACCESS_TOKEN
        sync: false
      - key: SLACK_SALES_WEBHOOK_URL
        sync: false
      - key: NUCLEUS_PHONE_API_KEY
        sync: false
